services:
  landing:
    build:
      context: ../..
      dockerfile: apps/landing/Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - PORT=3002

  mitshe:
    build:
      context: ../..
      dockerfile: docker/light/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - mitshe-data:/build/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AUTH_MODE=selfhosted
      - NEXT_PUBLIC_AUTH_MODE=selfhosted
      - NEXT_PUBLIC_APP_URL=https://app.mitshe.com
      - NEXT_PUBLIC_API_URL=https://api.mitshe.com
      - NEXT_PUBLIC_WS_URL=wss://api.mitshe.com
      - DATABASE_URL=file:/build/data/mitshe.db
      - REDIS_URL=redis://redis:6379
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mitshe-data:
  redis-data:
